<!DOCTYPE html>
 <html lang="en">
 <head>
     <meta charset="UTF-8">
     <title>二次方程求解器</title>
 </head>
 <body>
     <script>
         // (1) 获取用户输入的系数a、b、c
         let a = prompt("请输入系数a（a > 0）：");
         let b = prompt("请输入系数b：");
         let c = prompt("请输入系数c：");
         // (2) 转换为数字类型
         a = parseFloat(a);
         b = parseFloat(b);
         c = parseFloat(c);
         // (3) 计算判别式delta
         let delta = b * b - 4 * a * c;
         // (4) 计算两个根
         let x1 = (-b + Math.sqrt(delta)) / (2 * a);
         let x2 = (-b - Math.sqrt(delta)) / (2 * a);
         // (5) 用alert展示结果
         alert("二次方程的根为：\nx1 = " + x1 + "\nx2 = " + x2);
         // (6) 用console.log展示结果
         console.log("x1 =", x1);
         console.log("x2 =", x2);
     </script>
 </body>
 </html>
